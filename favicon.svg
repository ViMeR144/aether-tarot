<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Чёрный круг фон -->
  <circle cx="50" cy="50" r="50" fill="#0C0C0F"/>

  <!-- Карта таро — рамка -->
  <rect x="22" y="10" width="56" height="80" rx="6" ry="6"
        fill="#0C0C0F" stroke="#C9A84C" stroke-width="2.2"/>

  <!-- Лучи от центра -->
  <g stroke="#C9A84C" stroke-width="1" opacity="0.7">
    <line x1="50" y1="50" x2="50" y2="13"/>
    <line x1="50" y1="50" x2="50" y2="87"/>
    <line x1="50" y1="50" x2="23" y2="30"/>
    <line x1="50" y1="50" x2="77" y2="30"/>
    <line x1="50" y1="50" x2="23" y2="70"/>
    <line x1="50" y1="50" x2="77" y2="70"/>
    <line x1="50" y1="50" x2="30" y2="15"/>
    <line x1="50" y1="50" x2="70" y2="15"/>
    <line x1="50" y1="50" x2="30" y2="85"/>
    <line x1="50" y1="50" x2="70" y2="85"/>
    <line x1="50" y1="50" x2="23" y2="50"/>
    <line x1="50" y1="50" x2="77" y2="50"/>
  </g>

  <!-- Глаз — форма -->
  <ellipse cx="50" cy="50" rx="16" ry="9" fill="#0C0C0F" stroke="#C9A84C" stroke-width="1.8"/>

  <!-- Звезда внутри глаза (8 лучей) -->
  <g fill="#C9A84C">
    <polygon points="50,43 51.2,48.8 57,50 51.2,51.2 50,57 48.8,51.2 43,50 48.8,48.8"/>
    <!-- маленькие точки вокруг звезды -->
    <circle cx="44" cy="49" r="0.8" opacity="0.6"/>
    <circle cx="56" cy="51" r="0.8" opacity="0.6"/>
  </g>

  <!-- Зрачок/радужка -->
  <circle cx="50" cy="50" r="4.5" fill="none" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- Верхний полумесяц -->
  <path d="M47,19 Q50,15 53,19 Q50,17 47,19 Z" fill="#C9A84C"/>
  <path d="M48,20 A4,4 0 0 1 52,20 A3,3 0 0 0 48,20 Z" fill="#C9A84C" opacity="0.9"/>
  <!-- проще — серп -->
  <path d="M48.5,17.5 A3,3 0 1 1 51.5,17.5 A2,2 0 1 0 48.5,17.5 Z" fill="#C9A84C"/>

  <!-- Нижний полумесяц -->
  <path d="M48.5,82.5 A3,3 0 1 0 51.5,82.5 A2,2 0 1 1 48.5,82.5 Z" fill="#C9A84C"/>

  <!-- Мелкие звёздочки-искры -->
  <g fill="#C9A84C" opacity="0.85">
    <!-- верх лево -->
    <polygon points="31,24 31.8,26.8 34.6,27.6 31.8,28.4 31,31.2 30.2,28.4 27.4,27.6 30.2,26.8" transform="scale(0.55) translate(26,16)"/>
    <!-- верх право -->
    <polygon points="69,24 69.8,26.8 72.6,27.6 69.8,28.4 69,31.2 68.2,28.4 65.4,27.6 68.2,26.8" transform="scale(0.55) translate(-20,16)"/>
    <!-- низ лево -->
    <polygon points="31,68 31.6,70 33.6,70.6 31.6,71.2 31,73.2 30.4,71.2 28.4,70.6 30.4,70" transform="scale(0.5) translate(28,-20)"/>
    <!-- низ право -->
    <polygon points="69,68 69.6,70 71.6,70.6 69.6,71.2 69,73.2 68.4,71.2 66.4,70.6 68.4,70" transform="scale(0.5) translate(-22,-20)"/>
    <!-- маленькие точки -->
    <circle cx="36" cy="38" r="1.2"/>
    <circle cx="64" cy="38" r="1.2"/>
    <circle cx="36" cy="62" r="1.2"/>
    <circle cx="64" cy="62" r="1.2"/>
    <circle cx="30" cy="50" r="0.9"/>
    <circle cx="70" cy="50" r="0.9"/>
  </g>
</svg>
